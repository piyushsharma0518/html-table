<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Mood Study Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .app {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #1a1a2e; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
    .section-label {
      font-size: 12px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 10px; margin-top: 1.5rem;
    }
    .mood-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .mood-btn {
      background: #fff; border: 1px solid #e2e2e8;
      border-radius: 12px; padding: 12px 8px;
      cursor: pointer; text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      transition: all 0.15s; font-family: inherit;
    }
    .mood-btn:hover { background: #f0effe; border-color: #a09be8; }
    .mood-btn.selected { border: 2px solid #7c72dd; background: #eeedfe; }
    .mood-btn .icon { font-size: 22px; }
    .mood-btn .label { font-size: 11px; color: #666; font-weight: 500; }
    .mood-btn.selected .label { color: #534ab7; }
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .subject-chip {
      background: #fff; border: 1px solid #e2e2e8;
      border-radius: 8px; padding: 8px 12px;
      cursor: pointer; font-size: 13px;
      color: #555; text-align: center;
      transition: all 0.15s; user-select: none;
    }
    .subject-chip:hover { border-color: #aaa; color: #222; }
    .subject-chip.selected {
      border: 2px solid #1d9e75; background: #e1f5ee;
      color: #0f6e56; font-weight: 500;
    }
    .ask-btn {
      width: 100%; margin-top: 1.5rem;
      padding: 13px; background: #1a1a2e;
      color: white; border: none;
      border-radius: 12px; font-size: 15px;
      font-weight: 500; cursor: pointer;
      font-family: inherit; transition: opacity 0.15s;
    }
    .ask-btn:hover { opacity: 0.85; }
    .ask-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .result-card {
      display: none; margin-top: 1.5rem;
      border: 1px solid #e2e2e8; border-radius: 16px;
      padding: 1.25rem;
    }
    .result-card.visible { display: block; }
    .result-header {
      display: flex; align-items: center;
      gap: 12px; margin-bottom: 12px;
    }
    .result-emoji {
      width: 40px; height: 40px;
      background: #eeedfe; border-radius: 50%;
      display: flex; align-items: center;
      justify-content: center; font-size: 20px;
      flex-shrink: 0;
    }
    .result-title { font-size: 16px; font-weight: 600; color: #1a1a2e; }
    .result-subtitle { font-size: 12px; color: #888; }
    .result-body {
      font-size: 14px; color: #444;
      line-height: 1.75; white-space: pre-wrap;
    }
    .dots { display: inline-flex; gap: 4px; align-items: center; }
    .dots span {
      width: 6px; height: 6px;
      background: #999; border-radius: 50%;
      animation: bounce 1s ease infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.15s; }
    .dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    hr { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
  </style>
</head>
<body>
<div class="app">
  <h1>🎓 Mood Study Assistant</h1>
  <p class="subtitle">Tell us how you feel — we'll tell you what to study</p>


  <div class="section-label">How are you feeling?</div>
  <div class="mood-grid" id="moodGrid">
    <button class="mood-btn" data-mood="stressed" onclick="selectMood(this)">
      <span class="icon">😰</span><span class="label">Stressed</span>
    </button>
    <button class="mood-btn" data-mood="focused" onclick="selectMood(this)">
      <span class="icon">🎯</span><span class="label">Focused</span>
    </button>
    <button class="mood-btn" data-mood="energetic" onclick="selectMood(this)">
      <span class="icon">⚡</span><span class="label">Energetic</span>
    </button>
    <button class="mood-btn" data-mood="bored" onclick="selectMood(this)">
      <span class="icon">😑</span><span class="label">Bored</span>
    </button>
    <button class="mood-btn" data-mood="sad" onclick="selectMood(this)">
      <span class="icon">😔</span><span class="label">Sad</span>
    </button>
    <button class="mood-btn" data-mood="sleepy" onclick="selectMood(this)">
      <span class="icon">😴</span><span class="label">Sleepy</span>
    </button>
    <button class="mood-btn" data-mood="happy" onclick="selectMood(this)">
      <span class="icon">😊</span><span class="label">Happy</span>
    </button>
    <button class="mood-btn" data-mood="anxious" onclick="selectMood(this)">
      <span class="icon">😬</span><span class="label">Anxious</span>
    </button>
  </div>


  <hr />


  <div class="section-label">Your subjects (select all that apply)</div>
  <div class="subjects-grid" id="subjectGrid">
    <div class="subject-chip" onclick="toggleSubject(this)">Mathematics</div>
    <div class="subject-chip" onclick="toggleSubject(this)">Physics</div>
    <div class="subject-chip" onclick="toggleSubject(this)">Chemistry</div>
    <div class="subject-chip" onclick="toggleSubject(this)">Biology</div>
    <div class="subject-chip" onclick="toggleSubject(this)">History</div>
    <div class="subject-chip" onclick="toggleSubject(this)">English</div>
    <div class="subject-chip" onclick="toggleSubject(this)">Computer Science</div>
    <div class="subject-chip" onclick="toggleSubject(this)">Economics</div>
    <div class="subject-chip" onclick="toggleSubject(this)">Psychology</div>
    <div class="subject-chip" onclick="toggleSubject(this)">Geography</div>
  </div>


  <button class="ask-btn" id="askBtn" onclick="getRecommendation()" disabled>
    ✨ Get My Study Plan
  </button>


  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-emoji" id="resultIcon">✨</div>
      <div>
        <div class="result-title" id="resultTitle">AI Recommendation</div>
        <div class="result-subtitle" id="resultSubtitle"></div>
      </div>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>
</div>


<script>
  const API_KEY = "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"; // 🔑 Replace this!


  let selectedMood = null;
  let selectedSubjects = [];


  function selectMood(el) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedMood = el.dataset.mood;
    checkReady();
  }


  function toggleSubject(el) {
    const name = el.textContent;
    if (el.classList.contains('selected')) {
      el.classList.remove('selected');
      selectedSubjects = selectedSubjects.filter(s => s !== name);
    } else {
      el.classList.add('selected');
      selectedSubjects.push(name);
    }
    checkReady();
  }


  function checkReady() {
    document.getElementById('askBtn').disabled =
      !(selectedMood && selectedSubjects.length > 0);
  }


  async function getRecommendation() {
    const card = document.getElementById('resultCard');
    const body = document.getElementById('resultBody');
    const title = document.getElementById('resultTitle');
    const subtitle = document.getElementById('resultSubtitle');
    const icon = document.getElementById('resultIcon');


    card.classList.add('visible');
    title.textContent = 'Thinking...';
    subtitle.textContent = '';
    body.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    icon.textContent = '✨';


    const prompt = `You are a friendly AI study assistant. A student is feeling "${selectedMood}" right now.
Their available subjects are: ${selectedSubjects.join(', ')}.


Based on their mood, recommend the BEST subject to study right now and explain why it matches their current mental state.


Your response must include:
1. 📚 RECOMMENDED SUBJECT: [subject name]
2. 🧠 WHY IT FITS YOUR MOOD: [2-3 sentences explanation]
3. ⏱️ SUGGESTED STUDY TIME: [e.g. 25 min focused / 45 min light reading]
4. 💡 STUDY TIP: [one specific, actionable tip for studying this subject in this mood]
5. 💬 MOTIVATIONAL MESSAGE: [one short, warm encouraging line]


Keep it concise, warm, and practical.`;

const res = await fetch("/api/recommend", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    messages: [{ role: "user", content: prompt }]
  })
});


      const data = await res.json();
      const text = data.content?.[0]?.text || "Sorry, could not get a recommendation.";


      const subjectMatch = text.match(/RECOMMENDED SUBJECT[:\s]+([^\n]+)/i);
      const subject = subjectMatch
        ? subjectMatch[1].replace(/[*_📚]/g, '').trim()
        : selectedSubjects[0];


      const moodIcons = {
        stressed:'😰', focused:'🎯', energetic:'⚡',
        bored:'😑', sad:'😔', sleepy:'😴', happy:'😊', anxious:'😬'
      };


      title.textContent = subject;
      subtitle.textContent = `Best match for your ${selectedMood} mood`;
      icon.textContent = moodIcons[selectedMood] || '✨';
      body.textContent = text;


    } catch (err) {
      body.textContent = "Something went wrong: " + err.message;
      title.textContent = 'Error';
    }
  }
</script>
</body>
</html>.
